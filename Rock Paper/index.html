<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Rock Paper Scissor </h1>
    <div class="choices">

        <div id = "rock" class="choice">
            <img src="rock.png" alt="paper_image">
        </div>

        <div id = "paper" class="choice">
            <img src="paper.png" alt="rock">
        </div>
         
         <div id = "scissor" class="choice">
            <img src="scissors.png" alt="scissor">
        </div>
    </div>

    <div class="scoreboard">
        <div class="score">
            <p id = "user-score" >0</p>
            <p id = "me">You</p>
        </div>
        <div class="score">
            <p id = "comp-score">0</p>
            <p id = "comp">Comp</p>
        </div>
    </div>

    <div class="msgContainer">
        <p id = "msg">Pick your Move</p>
    </div>

    <script src = "script.js"></script>
</body>
</html>
